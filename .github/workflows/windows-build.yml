name: Windows Build

on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  VCPKG_VERSION: "2025.04.09"
  VCPKG_INSTALLATION_ROOT: "C:\\vcpkg"
  VCPKG_DISABLE_METRICS: "1"

jobs:
  prepare-dependencies:
    name: Prepare Windows Dependencies
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg installation and installed packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}
          key: ${{ runner.os }}-vcpkg-root-${{ env.VCPKG_VERSION }}-${{ matrix.arch }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-root-${{ env.VCPKG_VERSION }}-${{ matrix.arch }}-

      - name: Setup vcpkg path and install dependencies
        run: |
          vcpkg integrate install
          vcpkg install --triplet=${{ matrix.arch }}-windows --recurse
        shell: pwsh

  build-windows:
    name: Windows MSVC Build
    runs-on: windows-latest
    needs: prepare-dependencies
    
    strategy:
      matrix:
        build_type: [Debug, Release]
        arch: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Restore vcpkg installation
        id: cache-vcpkg-restore
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}
          key: ${{ runner.os }}-vcpkg-root-${{ env.VCPKG_VERSION }}-${{ matrix.arch }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-root-${{ env.VCPKG_VERSION }}-${{ matrix.arch }}-
    
      - name: Configure CMake
        shell: pwsh
        run: |
          mkdir build -ErrorAction SilentlyContinue
          cmake -B build `
            -S . `
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_INSTALLATION_ROOT }}/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.arch }}-windows `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DBUILD_TESTING=ON `
            -DOPENDHT_PROXY_CLIENT=ON `
            -DOPENDHT_PROXY_SERVER=ON `
            -DOPENDHT_C=ON `
            -DOPENDHT_TOOLS=OFF `
            -DOPENDHT_PYTHON=OFF `
            -DOPENDHT_PEER_DISCOVERY=ON `
            -DOPENDHT_HTTP=ON `
            -A ${{ matrix.arch }}

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build_type }} --parallel 4

      - name: Test
        run: |
          cd build
          ctest --build-config ${{ matrix.build_type }} --output-on-failure --parallel 4

      - name: Upload build artifacts
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: opendht-windows-${{ matrix.arch }}-${{ matrix.build_type }}
          path: |
            build/**/*.exe
            build/**/*.dll
            build/**/*.lib
          retention-days: 7

  build-windows-mingw:
    name: Windows MinGW Build
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-ncurses
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-nettle
            mingw-w64-clang-x86_64-msgpack-cxx
            mingw-w64-x86_64-jsoncpp
            mingw-w64-x86_64-fmt
            mingw-w64-x86_64-asio
            mingw-w64-x86_64-argon2
            mingw-w64-x86_64-openssl

      - name: Prepare dependencies from source (expected-lite, llhttp, restinio)
        shell: msys2 {0}
        env:
          LLHTTP_VERSION: "v9.2.1"
          RESTINIO_VERSION: "0.7.6"
          EXPECTED_LITE_URL: "https://raw.githubusercontent.com/martinmoene/expected-lite/master/include/nonstd/expected.hpp"
        run: |
          # Create installation directory
          mkdir -p _deps_install_mingw
          export DEPS_PREFIX_PATH=$(pwd)/_deps_install_mingw
          
          # Install expected-lite header
          mkdir -p ${DEPS_PREFIX_PATH}/include/nonstd
          curl -L "${EXPECTED_LITE_URL}" -o ${DEPS_PREFIX_PATH}/include/nonstd/expected.hpp
          
          # Build and install llhttp
          mkdir llhttp
          curl -L "https://github.com/nodejs/llhttp/archive/refs/tags/release/${LLHTTP_VERSION}.tar.gz" -o llhttp.tar.gz
          tar -xzf llhttp.tar.gz -C llhttp --strip-components=1
          cd llhttp
          cmake -DCMAKE_INSTALL_PREFIX=${DEPS_PREFIX_PATH} -DCMAKE_BUILD_TYPE=Release .
          make -j2
          make install
          cd ..
          rm -rf llhttp*
          
          # Build and install restinio
          mkdir restinio && cd restinio
          curl -L "https://github.com/Stiffstream/restinio/releases/download/v${RESTINIO_VERSION}/restinio-${RESTINIO_VERSION}.tar.bz2" -o restinio.tar.bz2
          tar -xjf restinio.tar.bz2
          cd restinio-${RESTINIO_VERSION}/dev
          cmake -DCMAKE_INSTALL_PREFIX=${DEPS_PREFIX_PATH} \
                -DRESTINIO_TEST=Off -DRESTINIO_SAMPLE=Off -DRESTINIO_BENCHMARK=Off \
                -DRESTINIO_WITH_SOBJECTIZER=Off \
                -DRESTINIO_DEP_STANDALONE_ASIO=system -DRESTINIO_DEP_LLHTTP=system \
                -DRESTINIO_DEP_FMT=system -DRESTINIO_DEP_EXPECTED_LITE=system .
          make install
          cd ../../..
          rm -rf restinio*
          
          # Export the path for use in subsequent steps
          echo "DEPS_MINGW_PREFIX_PATH=${DEPS_PREFIX_PATH}" >> $GITHUB_ENV

      - name: Build with MinGW
        shell: msys2 {0}
        run: |
          mkdir build_mingw
          cd build_mingw
          cmake .. \
            -G "MinGW Makefiles" \
            -DCMAKE_PREFIX_PATH="/mingw64;/clang64;${DEPS_MINGW_PREFIX_PATH}" \
            -DCMAKE_MODULE_PATH="/clang64/lib/cmake" \
            -Dmsgpack-cxx_DIR="/clang64/lib/cmake/msgpack-cxx" \
            -DHAVE_MSGPACKCXX=ON \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTING=ON \
            -DOPENDHT_PROXY_CLIENT=ON \
            -DOPENDHT_PROXY_SERVER=ON \
            -DOPENDHT_C=ON \
            -DOPENDHT_TOOLS=ON \
            -DOPENDHT_PYTHON=OFF \
            -DOPENDHT_PEER_DISCOVERY=ON \
            -DOPENDHT_HTTP=ON
          make -j4

      - name: Test MinGW Build
        shell: msys2 {0}
        run: |
          cd build_mingw
          ctest --output-on-failure --parallel 4

      - name: Upload MinGW artifacts
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: opendht-windows-mingw-${{ matrix.build_type }}
          path: |
            build_mingw/**/*.exe
            build_mingw/**/*.dll
            build_mingw/**/*.a
          retention-days: 7
