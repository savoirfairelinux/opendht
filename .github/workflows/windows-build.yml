name: Windows Build
permissions:
  contents: read

on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  VCPKG_DISABLE_METRICS: "1"

jobs:
  # Pre-warm the vcpkg binary cache for x64-windows triplet.
  # Builds all packages once and saves them to the GHA binary cache.
  # Subsequent runs will restore from the binary cache (< 1 min).
  vcpkg-shared:
    name: Install vcpkg deps (x64-windows)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Compute vcpkg cache key
        id: vcpkg-key
        shell: pwsh
        run: |
          $combined = (Get-FileHash vcpkg.json -Algorithm SHA256).Hash + (Get-FileHash vcpkg-configuration.json -Algorithm SHA256).Hash
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($combined)
          $hash = (([System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') }) -join '').Substring(0, 16)
          echo "key=vcpkg-x64-windows-$hash-${{ runner.os }}" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg_installed from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: vcpkg_installed
          key: ${{ steps.vcpkg-key.outputs.key }}

      - name: Install vcpkg packages (with retry)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: pwsh
          command: |
            & "$env:VCPKG_ROOT/vcpkg.exe" install `
              --recurse `
              --clean-after-build `
              --triplet=x64-windows `
              --x-feature=test `
              --x-manifest-root=.
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Save vcpkg_installed to cache
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vcpkg_installed
          key: ${{ steps.vcpkg-key.outputs.key }}

  # Pre-warm the vcpkg binary cache for x64-windows-static-release triplet.
  vcpkg-static:
    name: Install vcpkg deps (x64-windows-static-release)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-release
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Compute vcpkg cache key
        id: vcpkg-key
        shell: pwsh
        run: |
          $combined = (Get-FileHash vcpkg.json -Algorithm SHA256).Hash + (Get-FileHash vcpkg-configuration.json -Algorithm SHA256).Hash
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($combined)
          $hash = (([System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') }) -join '').Substring(0, 16)
          echo "key=vcpkg-x64-windows-static-release-$hash-${{ runner.os }}" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg_installed from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: vcpkg_installed
          key: ${{ steps.vcpkg-key.outputs.key }}

      - name: Install vcpkg packages (with retry)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: pwsh
          command: |
            & "$env:VCPKG_ROOT/vcpkg.exe" install `
              --recurse `
              --clean-after-build `
              --triplet=x64-windows-static-release `
              --x-feature=test `
              --x-manifest-root=.
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Save vcpkg_installed to cache
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vcpkg_installed
          key: ${{ steps.vcpkg-key.outputs.key }}

  build-windows:
    name: Windows MSVC (${{ matrix.arch }}-windows, ${{ matrix.build_type }}, C++${{ matrix.cxx_standard }})
    runs-on: windows-latest
    needs: vcpkg-shared
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        arch: [x64]
        cxx_standard: [17, 20, 23]
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.arch }}-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Compute vcpkg cache key
        id: vcpkg-key
        shell: pwsh
        run: |
          $combined = (Get-FileHash vcpkg.json -Algorithm SHA256).Hash + (Get-FileHash vcpkg-configuration.json -Algorithm SHA256).Hash
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($combined)
          $hash = (([System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') }) -join '').Substring(0, 16)
          echo "key=vcpkg-x64-windows-$hash-${{ runner.os }}" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg_installed from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: vcpkg_installed
          key: ${{ steps.vcpkg-key.outputs.key }}

      - name: Install vcpkg packages if cache miss (with retry)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: pwsh
          command: >-
            & "$env:VCPKG_ROOT/vcpkg.exe" install
            --recurse
            --clean-after-build
            --triplet=${{ matrix.arch }}-windows
            --x-feature=test
            --x-manifest-root=.

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -S . `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.arch }}-windows `
            -DVCPKG_MANIFEST_INSTALL=OFF `
            -DVCPKG_MANIFEST_FEATURES=test `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }} `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DBUILD_TESTING=ON `
            -DOPENDHT_PROXY_CLIENT=ON `
            -DOPENDHT_PROXY_SERVER=ON `
            -DOPENDHT_C=ON `
            -DOPENDHT_TOOLS=ON `
            -DOPENDHT_PYTHON=OFF `
            -DOPENDHT_DOCUMENTATION=OFF `
            -DOPENDHT_PEER_DISCOVERY=ON `
            -DOPENDHT_HTTP=ON `
            -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel 4

      - name: Test
        if: matrix.build_type == 'Release'
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Upload build artifacts
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: opendht-windows-${{ matrix.arch }}-cxx${{ matrix.cxx_standard }}-${{ matrix.build_type }}
          path: |
            build/**/*.exe
            build/**/*.dll
            build/**/*.lib
          retention-days: 7

  build-windows-static:
    name: Windows Static MSVC (${{ matrix.arch }}-windows-static-release, ${{ matrix.build_type }}, C++${{ matrix.cxx_standard }})
    runs-on: windows-latest
    needs: vcpkg-static
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        arch: [x64]
        cxx_standard: [17, 20, 23]
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.arch }}-windows-static-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Compute vcpkg cache key
        id: vcpkg-key
        shell: pwsh
        run: |
          $combined = (Get-FileHash vcpkg.json -Algorithm SHA256).Hash + (Get-FileHash vcpkg-configuration.json -Algorithm SHA256).Hash
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($combined)
          $hash = (([System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') }) -join '').Substring(0, 16)
          echo "key=vcpkg-x64-windows-static-release-$hash-${{ runner.os }}" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg_installed from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: vcpkg_installed
          key: ${{ steps.vcpkg-key.outputs.key }}

      - name: Install vcpkg packages if cache miss (with retry)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: pwsh
          command: >-
            & "$env:VCPKG_ROOT/vcpkg.exe" install
            --recurse
            --clean-after-build
            --triplet=${{ matrix.arch }}-windows-static-release
            --x-feature=test
            --x-manifest-root=.

      - name: Configure CMake for Static Build
        shell: pwsh
        run: |
          cmake -B build `
            -S . `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.arch }}-windows-static-release `
            -DVCPKG_MANIFEST_INSTALL=OFF `
            -DVCPKG_MANIFEST_FEATURES=test `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }} `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=ON `
            -DOPENDHT_PROXY_CLIENT=ON `
            -DOPENDHT_PROXY_SERVER=ON `
            -DOPENDHT_C=ON `
            -DOPENDHT_TOOLS=ON `
            -DOPENDHT_PYTHON=OFF `
            -DOPENDHT_DOCUMENTATION=OFF `
            -DOPENDHT_PEER_DISCOVERY=ON `
            -DOPENDHT_HTTP=ON `
            -A ${{ matrix.arch }}

      - name: Build Static
        run: cmake --build build --config ${{ matrix.build_type }} --parallel 4

      - name: Test Static Build
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Upload static build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opendht-windows-static-${{ matrix.arch }}-cxx${{ matrix.cxx_standard }}-${{ matrix.build_type }}
          path: |
            build/**/*.exe
            build/**/*.lib
          retention-days: 7

  build-windows-mingw:
    name: Windows MinGW Build
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Release]
        #build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-cppunit
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-ncurses
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-jsoncpp
            mingw-w64-x86_64-fmt
            mingw-w64-x86_64-asio
            mingw-w64-x86_64-argon2
            mingw-w64-x86_64-openssl
            mingw-w64-clang-x86_64-msgpack-cxx

      - name: Prepare dependencies from source (expected-lite, llhttp, restinio)
        shell: msys2 {0}
        env:
          LLHTTP_VERSION: "v9.2.1"
          RESTINIO_VERSION: "0.7.6"
          EXPECTED_LITE_URL: "https://raw.githubusercontent.com/martinmoene/expected-lite/master/include/nonstd/expected.hpp"
        run: |
          MSYS2_SYSROOT=$(cygpath -u "$MSYSTEM_PREFIX")

          # Install expected-lite header
          mkdir -p ${MSYS2_SYSROOT}/include/nonstd
          curl -L "${EXPECTED_LITE_URL}" -o ${MSYS2_SYSROOT}/include/nonstd/expected.hpp

          # Build and install llhttp
          mkdir llhttp
          curl -L "https://github.com/nodejs/llhttp/archive/refs/tags/release/${LLHTTP_VERSION}.tar.gz" -o llhttp.tar.gz
          tar -xzf llhttp.tar.gz -C llhttp --strip-components=1
          cd llhttp
          cmake -G "MinGW Makefiles" \
                -DCMAKE_INSTALL_PREFIX=${MSYS2_SYSROOT} \
                -DCMAKE_BUILD_TYPE=Release .
          cmake --build . --parallel 2
          cmake --install .
          cd ..
          rm -rf llhttp*
          
          # Build and install restinio
          mkdir restinio && cd restinio
          curl -L "https://github.com/Stiffstream/restinio/releases/download/v${RESTINIO_VERSION}/restinio-${RESTINIO_VERSION}.tar.bz2" -o restinio.tar.bz2
          tar -xjf restinio.tar.bz2
          cd restinio-${RESTINIO_VERSION}/dev
          cmake -G "MinGW Makefiles" \
                -DCMAKE_INSTALL_PREFIX=${MSYS2_SYSROOT} \
                -DCMAKE_BUILD_TYPE=Release \
                -DRESTINIO_TEST=Off -DRESTINIO_SAMPLE=Off -DRESTINIO_BENCHMARK=Off \
                -DRESTINIO_WITH_SOBJECTIZER=Off \
                -DRESTINIO_DEP_STANDALONE_ASIO=system -DRESTINIO_DEP_LLHTTP=system \
                -DRESTINIO_DEP_FMT=system -DRESTINIO_DEP_EXPECTED_LITE=system .
          cmake --install .
          cd ../../..
          rm -rf restinio*

          # Copy msgpack-cxx headers
          mkdir -p ${MSYS2_SYSROOT}/include/msgpack
          cp -r /clang64/include/msgpack/* ${MSYS2_SYSROOT}/include/msgpack/
          cp /clang64/include/msgpack.hpp ${MSYS2_SYSROOT}/include/msgpack.hpp

      - name: Build with MinGW
        shell: msys2 {0}
        run: |
          mkdir build_mingw
          cd build_mingw
          cmake .. \
            -G "MinGW Makefiles" \
            -DHAVE_MSGPACKCXX=ON \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTING=ON \
            -DOPENDHT_PROXY_CLIENT=ON \
            -DOPENDHT_PROXY_SERVER=ON \
            -DOPENDHT_C=ON \
            -DOPENDHT_TOOLS=ON \
            -DOPENDHT_PYTHON=OFF \
            -DOPENDHT_DOCUMENTATION=OFF \
            -DOPENDHT_PEER_DISCOVERY=ON \
            -DOPENDHT_HTTP=ON
          cmake --build . --parallel 4

      #- name: Test MinGW Build
      #  shell: msys2 {0}
      #  run: |
      #    cd build_mingw
      #    ctest --output-on-failure --parallel 4

      - name: Upload MinGW artifacts
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: opendht-windows-mingw-${{ matrix.build_type }}
          path: |
            build_mingw/**/*.exe
            build_mingw/**/*.dll
            build_mingw/**/*.a
          retention-days: 7
